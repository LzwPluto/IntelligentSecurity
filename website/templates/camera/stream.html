{% extends "base.html" %}
{% block title %}摄像头监控{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h4><i class="bi bi-camera-video"></i> 摄像头实时监控</h4>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-camera-video-fill"></i> 实时画面</span>
                <span class="badge bg-success" id="camera-status-badge">在线</span>
            </div>
            <div class="card-body text-center p-2">
                <div id="camera-container">
                    <img id="camera-stream" src="{{ url_for('camera.video_feed') }}"
                         class="img-fluid rounded" alt="摄像头画面"
                         style="max-height: 480px;"
                         onerror="showOffline()">
                    <div id="camera-offline" style="display: none;" class="py-5">
                        <i class="bi bi-camera-video-off text-muted" style="font-size: 4rem;"></i>
                        <p class="mt-3 text-muted">摄像头不可用</p>
                        <p class="text-muted small">可能正被人脸识别模块占用，请稍后再试</p>
                        <button class="btn btn-outline-primary" onclick="retryCamera()">
                            <i class="bi bi-arrow-clockwise"></i> 重试连接
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-3">
            <small class="text-muted">
                <i class="bi bi-info-circle"></i>
                摄像头与人脸识别模块共享，当人脸识别运行时画面将暂停
            </small>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function showOffline() {
    document.getElementById('camera-stream').style.display = 'none';
    document.getElementById('camera-offline').style.display = 'block';
    document.getElementById('camera-status-badge').className = 'badge bg-danger';
    document.getElementById('camera-status-badge').textContent = '离线';
}

function retryCamera() {
    document.getElementById('camera-offline').style.display = 'none';
    const img = document.getElementById('camera-stream');
    img.style.display = 'block';
    img.src = '{{ url_for("camera.video_feed") }}?t=' + Date.now();
    document.getElementById('camera-status-badge').className = 'badge bg-success';
    document.getElementById('camera-status-badge').textContent = '在线';
}
</script>
{% endblock %}
